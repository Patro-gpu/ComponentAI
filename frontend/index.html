<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComponentAI - AI 组件生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text-secondary: #999;
            --accent: #6c5ce7;
            --accent-hover: #7d6ff0;
            --success: #00b894;
            --radius: 10px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 1100px; }

        header {
            text-align: center;
            margin-bottom: 36px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        header p { color: var(--text-secondary); font-size: 0.95rem; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
        }

        .card h2 { font-size: 1.1rem; margin-bottom: 14px; color: #fff; }

        label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }

        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s;
        }

        textarea:focus { outline: none; border-color: var(--accent); }

        .component-type-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 6px;
        }

        .type-chip {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .type-chip:hover { border-color: var(--accent); color: #fff; }
        .type-chip.active { background: rgba(108,92,231,0.15); border-color: var(--accent); color: #fff; }

        .framework-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 6px;
        }

        .fw-chip {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .fw-chip:hover { border-color: var(--accent); color: #fff; }
        .fw-chip.active { background: rgba(108,92,231,0.15); border-color: var(--accent); color: #fff; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 26px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
            background: var(--accent);
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 18px rgba(108,92,231,0.3);
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn-secondary { background: var(--surface); border: 1px solid var(--border); }
        .btn-secondary:hover { background: #252525; box-shadow: none; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
            background: rgba(108,92,231,0.2);
            color: var(--accent);
            margin-left: 8px;
        }

        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 8px 18px;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            margin-bottom: -1px;
        }

        .tab:hover { color: #fff; }
        .tab.active { color: #fff; border-bottom-color: var(--accent); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        #codeOutput {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            min-height: 260px;
            white-space: pre-wrap;
            font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            overflow: auto;
            max-height: 500px;
        }

        #codeOutput:empty::after {
            content: '生成的代码将显示在这里...';
            color: var(--text-secondary);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        #previewFrame {
            width: 100%;
            min-height: 260px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
        }

        #previewPlaceholder {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 260px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .status.success { background: rgba(0,184,148,0.1); color: var(--success); }
        .status.error { background: rgba(255,118,117,0.1); color: #ff7675; }

        .preview-note {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        .preview-note a { color: var(--accent); }

        @media (max-width: 700px) {
            .component-type-grid { grid-template-columns: repeat(2, 1fr); }
            .framework-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>ComponentAI</h1>
        <p>描述你的需求，AI 帮你生成生产级组件代码</p>
    </header>

    <!-- Input Card -->
    <div class="card">
        <h2>描述你的组件需求</h2>
        <label>组件类型</label>
        <div class="component-type-grid" id="componentTypes">
            <div class="type-chip active" data-type="按钮">按钮</div>
            <div class="type-chip" data-type="表单">表单</div>
            <div class="type-chip" data-type="卡片">卡片</div>
            <div class="type-chip" data-type="弹窗">弹窗</div>
            <div class="type-chip" data-type="导航栏">导航栏</div>
            <div class="type-chip" data-type="表格">表格</div>
            <div class="type-chip" data-type="列表">列表</div>
            <div class="type-chip" data-type="自定义">自定义</div>
        </div>

        <label style="margin-top:18px;">目标框架</label>
        <div class="framework-grid" id="frameworks">
            <div class="fw-chip active" data-fw="react">React</div>
            <div class="fw-chip" data-fw="vue">Vue</div>
            <div class="fw-chip" data-fw="svelte">Svelte</div>
            <div class="fw-chip" data-fw="html">HTML/CSS</div>
            <div class="fw-chip" data-fw="web-component">Web Component</div>
        </div>

        <label style="margin-top:18px;">详细描述</label>
        <textarea id="description" placeholder="例如：一个圆角的主按钮，hover 时有阴影动画，支持 loading 状态和 disabled 状态，颜色要渐变紫色..."></textarea>
    </div>

    <!-- Output Card -->
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
            <h2 style="margin:0;">生成结果 <span class="badge" id="genInfo">React · 按钮</span></h2>
            <div class="btn-row">
                <button class="btn" id="generateBtn" onclick="generate()">生成组件</button>
                <button class="btn btn-secondary" id="copyBtn" onclick="copyOutput()" disabled>复制代码</button>
            </div>
        </div>

        <div class="tab-bar" style="margin-top:14px;">
            <button class="tab active" onclick="switchTab('code')">代码</button>
            <button class="tab" onclick="switchTab('preview')">预览</button>
        </div>

        <div class="tab-content active" id="tab-code">
            <div id="codeOutput"></div>
        </div>
        <div class="tab-content" id="tab-preview">
            <iframe id="previewFrame" style="display:none;"></iframe>
            <div id="previewPlaceholder">先生成组件，然后点"预览"查看效果</div>
        </div>

        <div id="status"></div>
    </div>
</div>

<script>
    let selectedType = '按钮';
    let selectedFramework = 'react';
    let generatedCode = '';
    const API_BASE = 'https://componentai-backend-production.up.railway.app';

    // ── Chip toggles ──────────────────────
    const chipGroups = {
        '#componentTypes .type-chip': (v) => { selectedType = v.dataset.type; },
        '#frameworks .fw-chip':       (v) => { selectedFramework = v.dataset.fw; },
    };

    for (const [selector, setter] of Object.entries(chipGroups)) {
        document.querySelectorAll(selector).forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll(selector).forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                setter(chip);
                updateGenInfo();
            });
        });
    }

    function updateGenInfo() {
        document.getElementById('genInfo').textContent = selectedFramework + ' · ' + selectedType;
    }

    // ── Tab switching ────────────────────
    function switchTab(name) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelector(`.tab:nth-child(${name === 'code' ? 1 : 2})`).classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');

        if (name === 'preview' && generatedCode) {
            renderPreview();
        }
    }

    // ── Preview rendering ────────────────
    function renderPreview() {
        const frame = document.getElementById('previewFrame');
        const placeholder = document.getElementById('previewPlaceholder');

        // Extract pure code (strip markdown ``` blocks)
        let code = generatedCode;
        const mdMatch = code.match(/```[\w]*\n?([\s\S]*?)```/);
        if (mdMatch) code = mdMatch[1].trim();

        if (selectedFramework === 'html') {
            placeholder.style.display = 'none';
            frame.style.display = 'block';
            const blob = new Blob([code], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
        } else if (selectedFramework === 'react') {
            // Try rendering React via CDN in iframe
            const html = buildReactPreviewHTML(code);
            placeholder.style.display = 'none';
            frame.style.display = 'block';
            const blob = new Blob([html], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
        } else {
            // Vue / Svelte / Web Component — show placeholder with link
            placeholder.innerHTML = `
                <div style="text-align:center;padding:20px;">
                    <p>${selectedFramework} 组件无法直接在浏览器中预览</p>
                    <p style="margin-top:8px;font-size:0.82rem;">
                        复制代码到 <a href="https://codesandbox.io" target="_blank" style="color:#6c5ce7;">CodeSandbox</a>
                        或 <a href="https://stackblitz.com" target="_blank" style="color:#6c5ce7;">StackBlitz</a> 查看效果
                    </p>
                </div>`;
            frame.style.display = 'none';
            placeholder.style.display = 'flex';
        }
    }

    function buildReactPreviewHTML(code) {
        // Strip import/export statements since we render inline
        let body = code
            .replace(/import\s+.*?from\s+['"].*?['"]\s*;?/g, '')
            .replace(/export\s+default\s+\w+\s*;?/g, '')
            .replace(/export\s+/g, '')
            .trim();

        // Find the main component name (function Name or const Name)
        let compName = 'App';
        const fnMatch = body.match(/function\s+(\w+)/);
        const constMatch = body.match(/const\s+(\w+)\s*=/);
        if (fnMatch) compName = fnMatch[1];
        else if (constMatch) compName = constMatch[1];

        return `<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
</head><body><div id="root"></div><script>
${body}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(${compName}));
<\/script></body></html>`;
    }

    // ── Generate ──────────────────────────
    async function generate() {
        const desc = document.getElementById('description').value.trim();
        const output = document.getElementById('codeOutput');
        const status = document.getElementById('status');
        const btn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');

        if (!desc) {
            status.innerHTML = '<div class="status error">请输入组件描述</div>';
            return;
        }

        btn.disabled = true;
        btn.textContent = '生成中...';
        output.textContent = '';
        status.innerHTML = '';
        generatedCode = '';
        copyBtn.disabled = true;

        try {
            const res = await fetch(API_BASE + '/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system: buildSystemPrompt(selectedType, selectedFramework),
                    user: desc
                })
            });

            if (!res.ok) {
                const errText = await res.text();
                throw new Error('HTTP ' + res.status + ': ' + errText);
            }

            const data = await res.json();
            generatedCode = data.content;
            output.textContent = generatedCode;
            copyBtn.disabled = false;
            status.innerHTML = '<div class="status success">生成完成</div>';
        } catch (err) {
            output.textContent = '';
            status.innerHTML = '<div class="status error">' + escapeHtml(err.message) + '</div>';
        } finally {
            btn.disabled = false;
            btn.textContent = '生成组件';
        }
    }

    function buildSystemPrompt(type, fw) {
        const guides = {
            react: 'Use React functional components with hooks (useState, useEffect). Use Tailwind CSS classes for styling. Export as default.',
            vue: 'Use Vue 3 Composition API with <script setup>. Use Tailwind CSS for styling. Single-file component.',
            svelte: 'Use Svelte 5 runes syntax ($state, $derived). Use Tailwind CSS for styling. Single-file component.',
            html: 'Use vanilla HTML/CSS/JS in a single file. Modern CSS features. Must be a complete runnable HTML file with <style> and <script> tags inline.',
            'web-component': 'Use native Web Components (customElements.define). Shadow DOM with encapsulated styles.'
        };

        return 'You are a senior frontend engineer. Generate a production-grade ' + type + ' component using ' + fw + '.\n\n' +
               'Framework: ' + (guides[fw] || 'Use modern best practices.') + '\n\n' +
               'Rules:\n' +
               '- Clean, well-structured code\n' +
               '- Include loading, empty, error, and disabled states\n' +
               '- Keyboard accessibility (ARIA, focus management)\n' +
               '- Semantic HTML\n' +
               '- Output ONLY the code, no explanations';
    }

    function copyOutput() {
        if (!generatedCode) return;
        navigator.clipboard.writeText(generatedCode).then(() => {
            const btn = document.getElementById('copyBtn');
            const orig = btn.textContent;
            btn.textContent = '已复制!';
            setTimeout(() => btn.textContent = orig, 1500);
        });
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    document.getElementById('description').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generate();
    });
</script>
</body>
</html>
